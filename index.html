<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABE!</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- navbar -->
    <nav id="navbar">
        <div id="navitem">
            <div class="navitem1">
                <h4>TABE!</h4>
            </div>
            <div class="navitem2">

    <!-- navbar end -->
    <!-- header -->
    <header class="header">
        <section class="header-logo">

    <section class="section-title">

    <section id="main-2">

    <section class="section-title">
        <div>
            <h2>Our <span class="graytext">Menu</span></h2>
        </div>

    <hr>

    <section id="menu-section">
        <div class="menu1">
            <img id="menuimg1" src="images/BBQ.png">

            <p class="menudesc">
                Hidangan fusion Jepang berbahan dasar nasi yang dipadukan dengan suwiran crabstick (kani) dan siraman saus mentai yang melimpah.
            </p>
